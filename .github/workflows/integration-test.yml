# integration-test.yml
#
# Full end-to-end integration test: indexes sample images, starts the search
# API and webapp, and verifies search returns results.
#
# Trigger: manual dispatch only. Run this before merging significant changes,
# or let the future release branch CI run it automatically.
#
# Future plan: add a `release` branch that main is pushed into; require this
# workflow as a status check there. That gives a full integration gate without
# slowing down every PR.
#
# Caching layers:
#   - Cachix binary cache       → nix derivations (python311, ffmpeg, nodejs, …)
#   - actions/cache venvs       → installed Python venvs (torch, transformers, …)
#   - actions/cache pip wheels  → downloaded .whl files
#   - actions/cache hf-models   → BLIP-2 (~4 GB) + sentence-transformer (~100 MB)
#   - actions/cache npm         → node_modules
#
# First run: cold nix + model download; expect 30–60 min.
# Subsequent runs: all caches warm; expect 5–15 min.
#
# Required secret: CACHIX_AUTH_TOKEN (same as quality-gate.yml)

name: integration-test

on:
  workflow_dispatch:

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      # Cache pip wheels for indexer + search (avoids redownloading packages).
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-e2e-${{ runner.os }}-${{ hashFiles('indexer/pyproject.toml', 'search/pyproject.toml', 'common/pyproject.toml') }}
          restore-keys: |
            pip-e2e-${{ runner.os }}-

      # Cache the installed venvs so pip install --quiet is a no-op on cache hit.
      # Keyed per pyproject.toml so a dep change busts the cache automatically.
      - uses: actions/cache@v4
        with:
          path: |
            indexer/.venv
            search/.venv
            common/.venv
            .e2e-venv
          key: venv-e2e-${{ runner.os }}-${{ hashFiles('indexer/pyproject.toml', 'search/pyproject.toml', 'common/pyproject.toml') }}

      # Cache npm packages for the webapp.
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-e2e-${{ runner.os }}-${{ hashFiles('webapp/package-lock.json') }}
          restore-keys: |
            npm-e2e-${{ runner.os }}-

      # Cache HuggingFace model weights (BLIP-2 ~4 GB, sentence-transformer ~100 MB).
      # Both land under ~/.cache/huggingface/hub/ — transformers and
      # sentence-transformers>=3.0 both use the HF hub cache by default.
      # Key is stable — models don't change between runs unless pyproject.toml changes.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-${{ hashFiles('indexer/pyproject.toml', 'common/pyproject.toml') }}
          restore-keys: |
            hf-models-${{ runner.os }}-

      # Cache Whisper model weights (~140 MB for "base").
      # Whisper stores models in ~/.cache/whisper (or $WHISPER_MODEL_DIR when set).
      # Key includes blip2.py so a model-name change in the source busts the cache.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-${{ runner.os }}-${{ hashFiles('indexer/pyproject.toml', 'indexer/src/indexer/models/blip2.py') }}
          restore-keys: |
            whisper-${{ runner.os }}-

      - name: run e2e tests
        run: nix develop .#e2e --command pytest runner-scripts/e2e-test/test_e2e.py -v
