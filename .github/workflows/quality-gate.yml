# quality-gate.yml
#
# GitHub Branch Protection settings to configure in the GitHub UI
# (Settings → Branches → Add branch protection rule → Branch name pattern: main):
#
#   [x] Require a pull request before merging
#       [x] Require approvals: 1
#   [x] Require status checks to pass before merging
#       [x] Require branches to be up to date before merging
#       Status checks to add:
#         - build-common
#         - build-indexer
#         - build-search
#         - build-webapp
#   [x] Do not allow bypassing the above settings
#   [ ] Allow auto-merge — leave OFF (human reviewer decides)

name: quality-gate

on:
  pull_request:
    branches:
      - main

jobs:
  build-common:
    name: build-common
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-common-${{ runner.os }}-${{ hashFiles('common/pyproject.toml') }}
          restore-keys: |
            pip-common-${{ runner.os }}-

      - name: lint and test
        run: nix develop .#common --command bash -c "cd common && ruff check src/ tests/ && ruff format --check src/ tests/ && python -m mypy src/common && python -m pytest tests/ -v"

  build-indexer:
    name: build-indexer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-indexer-${{ runner.os }}-${{ hashFiles('indexer/pyproject.toml') }}
          restore-keys: |
            pip-indexer-${{ runner.os }}-

      - name: lint and test
        run: nix develop .#indexer --command bash -c "cd indexer && ruff check src/ tests/ && ruff format --check src/ tests/ && python -m mypy src/indexer && python -m pytest tests/ -v"

  build-search:
    name: build-search
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-search-${{ runner.os }}-${{ hashFiles('search/pyproject.toml') }}
          restore-keys: |
            pip-search-${{ runner.os }}-

      - name: lint and test
        run: nix develop .#search --command bash -c "cd search && ruff check src/ tests/ && ruff format --check src/ tests/ && python -m mypy src/search && python -m pytest tests/ -v"

  build-webapp:
    name: build-webapp
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('webapp/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: typecheck, test, and build
        run: nix develop .#webapp --command bash -c "npm run typecheck && npm test && npm run build"

  comment-on-failure:
    name: comment-on-failure
    runs-on: ubuntu-latest
    needs: [build-common, build-indexer, build-search, build-webapp]
    if: failure() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Post failure comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Quality Gate Failed',
                '- One or more jobs failed — check the output in the Actions tab.',
                '  - **build-common**: common package lint + type check + tests',
                '  - **build-indexer**: indexer package lint + type check + tests (ffmpeg via nix)',
                '  - **build-search**: search package lint + type check + tests',
                '  - **build-webapp**: webapp typecheck (tsc) + tests (vitest) + build (vite)',
                '',
                'Fix the issues and push a new commit to re-run the checks.',
              ].join('\n'),
            });
