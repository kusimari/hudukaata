# quality-gate.yml
#
# GitHub Branch Protection settings to configure in the GitHub UI
# (Settings → Branches → Add branch protection rule → Branch name pattern: main):
#
#   [x] Require a pull request before merging
#       [x] Require approvals: 1
#   [x] Require status checks to pass before merging
#       [x] Require branches to be up to date before merging
#       Status checks to add:
#         - all-green
#   [x] Do not allow bypassing the above settings
#   [ ] Allow auto-merge — leave OFF (human reviewer decides)
#
# NOTE: Require only "all-green", NOT the individual build-* jobs.
# Individual jobs are skipped when their package files didn't change;
# a skipped job does not satisfy a required check, but all-green handles this.

name: quality-gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      common: ${{ steps.filter.outputs.common }}
      indexer: ${{ steps.filter.outputs.indexer }}
      search: ${{ steps.filter.outputs.search }}
      webapp: ${{ steps.filter.outputs.webapp }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            common:
              - 'common/**'
              - 'flake.nix'
            indexer:
              - 'indexer/**'
              - 'common/**'
              - 'flake.nix'
            search:
              - 'search/**'
              - 'common/**'
              - 'flake.nix'
            webapp:
              - 'webapp/**'
              - 'flake.nix'

  build-common:
    name: build-common
    needs: changes
    if: needs.changes.outputs.common == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-common-${{ runner.os }}-${{ hashFiles('common/pyproject.toml') }}
          restore-keys: |
            pip-common-${{ runner.os }}-

      # Cache the venv so the shellHook stamp-file guard skips pip install on hit.
      - uses: actions/cache@v4
        with:
          path: common/.venv
          key: venv-common-${{ runner.os }}-${{ hashFiles('common/pyproject.toml') }}
          restore-keys: |
            venv-common-${{ runner.os }}-

      - name: lint and test
        run: nix develop .#common --command bash -c "cd common && ruff check src/ tests/ && ruff format --check src/ tests/ && python -m mypy src/common && python -m pytest tests/ -v"

  build-indexer:
    name: build-indexer
    needs: changes
    if: needs.changes.outputs.indexer == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-indexer-${{ runner.os }}-${{ hashFiles('common/pyproject.toml', 'indexer/pyproject.toml') }}
          restore-keys: |
            pip-indexer-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: indexer/.venv
          key: venv-indexer-${{ runner.os }}-${{ hashFiles('common/pyproject.toml', 'indexer/pyproject.toml') }}
          restore-keys: |
            venv-indexer-${{ runner.os }}-

      - name: lint and test
        run: nix develop .#indexer --command bash -c "cd indexer && ruff check src/ tests/ && ruff format --check src/ tests/ && python -m mypy src/indexer && python -m pytest tests/ -v"

  build-search:
    name: build-search
    needs: changes
    if: needs.changes.outputs.search == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-search-${{ runner.os }}-${{ hashFiles('search/pyproject.toml') }}
          restore-keys: |
            pip-search-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: search/.venv
          key: venv-search-${{ runner.os }}-${{ hashFiles('common/pyproject.toml', 'search/pyproject.toml') }}
          restore-keys: |
            venv-search-${{ runner.os }}-

      - name: lint and test
        run: nix develop .#search --command bash -c "cd search && ruff check src/ tests/ && ruff format --check src/ tests/ && python -m mypy src/search && python -m pytest tests/ -v"

  build-webapp:
    name: build-webapp
    needs: changes
    if: needs.changes.outputs.webapp == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - uses: cachix/cachix-action@v15
        with:
          name: hudukaata
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('webapp/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: typecheck, test, and build
        run: nix develop .#webapp --command bash -c "npm run typecheck && npm test && npm run build"

  all-green:
    name: all-green
    runs-on: ubuntu-latest
    needs: [build-common, build-indexer, build-search, build-webapp]
    if: always()

    steps:
      - name: Check all jobs passed or were skipped
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results" | jq -e '
            to_entries | map(.value.result) | all(. == "success" or . == "skipped")
          ' || {
            echo "One or more jobs failed or were cancelled."
            exit 1
          }

  comment-on-failure:
    name: comment-on-failure
    runs-on: ubuntu-latest
    needs: [build-common, build-indexer, build-search, build-webapp, all-green]
    if: failure() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Post failure comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Quality Gate Failed',
                '- One or more jobs failed — check the output in the Actions tab.',
                '  - **build-common**: common package lint + type check + tests',
                '  - **build-indexer**: indexer package lint + type check + tests (ffmpeg via nix)',
                '  - **build-search**: search package lint + type check + tests',
                '  - **build-webapp**: webapp typecheck (tsc) + tests (vitest) + build (vite)',
                '',
                'Jobs are only run when their package files (or dependencies) changed.',
                'Fix the issues and push a new commit to re-run the checks.',
              ].join('\n'),
            });
