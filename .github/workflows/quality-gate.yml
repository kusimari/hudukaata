# quality-gate.yml
#
# GitHub Branch Protection settings to configure in the GitHub UI
# (Settings → Branches → Add branch protection rule → Branch name pattern: main):
#
#   [x] Require a pull request before merging
#       [x] Require approvals: 1
#   [x] Require status checks to pass before merging
#       [x] Require branches to be up to date before merging
#       Status checks to add:
#         - build
#   [x] Do not allow bypassing the above settings
#   [ ] Allow auto-merge — leave OFF (human reviewer decides)

name: quality-gate

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: setup env
        run: nix develop .#indexer --command bash -c "echo env ready"

      - name: lint and test
        run: nix develop .#indexer --command bash -c "cd indexer && ruff check src/ tests/ && ruff format --check src/ tests/ && python -m mypy src/indexer && python -m pytest tests/ -v"

  comment-on-failure:
    name: comment-on-failure
    runs-on: ubuntu-latest
    needs: [build]
    if: failure() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Post failure comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '## Quality Gate Failed',
                '- **build** job failed — check ruff/mypy/pytest output in the Actions tab.',
                '',
                'Fix the issues and push a new commit to re-run the checks.',
              ].join('\n'),
            });
