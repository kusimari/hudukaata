[pytest]
# Disable stdout/stderr capture so all print() output from the e2e test is
# visible in CI logs whether the test passes or fails.
#
# Why this file exists here (not at repo root):
#   pytest determines rootdir by searching for an ini-file starting from the
#   common ancestor of the test paths.  With this file present, rootdir is set
#   to runner-scripts/e2e-test/ and addopts = -s applies only to e2e tests —
#   the per-package tests (common/, indexer/, search/, webapp/) each run from
#   their own package directory and are unaffected.
addopts = -s
